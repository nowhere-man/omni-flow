name: Build Multiplatform

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android arm64-v8a APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode Android keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$RELEASE_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/omniflow-release.keystore"
          test -s "$RUNNER_TEMP/omniflow-release.keystore"

      - name: Build signed arm64-v8a release APK
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew :shared:compileKotlinJvm :androidApp:assembleRelease --stacktrace \
            -PandroidArm64Only=true \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/omniflow-release.keystore" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Collect APK
        run: |
          mkdir -p dist
          APK=$(find androidApp/build/outputs/apk -type f -name '*arm64-v8a*.apk' -print -quit)
          test -n "$APK"
          VERSION="${GITHUB_REF_NAME//\//-}"
          cp "$APK" "dist/OmniFlow-Android-arm64-v8a-${VERSION}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: OmniFlow-Android-arm64-v8a
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

  ios:
    name: iOS App (arm64 IPA)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build KMP device framework
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64 --stacktrace

      - name: Build unsigned iOS device app
        run: |
          xcodebuild build \
            -project appleApp/OmniFlow.xcodeproj \
            -scheme OmniFlow-iOS \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/ios-derived-data \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            FRAMEWORK_SEARCH_PATHS="$GITHUB_WORKSPACE/shared/build/bin/iosArm64/releaseFramework" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package unsigned IPA
        run: |
          APP="build/ios-derived-data/Build/Products/Release-iphoneos/OmniFlow-iOS.app"
          test -d "$APP"
          mkdir -p dist Payload
          ditto "$APP" Payload/OmniFlow-iOS.app
          VERSION="${GITHUB_REF_NAME//\//-}"
          ditto -c -k --sequesterRsrc --keepParent Payload "dist/OmniFlow-iOS-arm64-${VERSION}-unsigned.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: OmniFlow-iOS-arm64-IPA
          path: dist/*.ipa
          if-no-files-found: error
          retention-days: 30

  macos:
    name: macOS ${{ matrix.arch }} DMG
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            kotlin_target: MacosArm64
            framework_target: macosArm64
          - arch: x86_64
            runner: macos-15-intel
            kotlin_target: MacosX64
            framework_target: macosX64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Import macOS signing assets
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          MACOS_PROVISIONING_PROFILE: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          for value in MACOS_CERTIFICATE MACOS_CERTIFICATE_PASSWORD MACOS_PROVISIONING_PROFILE MACOS_SIGNING_IDENTITY; do
            test -n "${!value}" || { echo "Missing required GitHub secret: $value" >&2; exit 1; }
          done

          KEYCHAIN_PATH="$RUNNER_TEMP/omniflow-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERTIFICATE_PATH="$RUNNER_TEMP/omniflow-developer-id.p12"
          PROFILE_PATH="$RUNNER_TEMP/omniflow.provisionprofile"
          PROFILE_PLIST="$RUNNER_TEMP/omniflow-profile.plist"

          printf '%s' "$MACOS_CERTIFICATE" | base64 -D > "$CERTIFICATE_PATH"
          printf '%s' "$MACOS_PROVISIONING_PROFILE" | base64 -D > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" -o "$PROFILE_PLIST"

          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$PROFILE_PLIST")
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$PROFILE_PLIST")
          PROFILE_ICLOUD_CONTAINER=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.icloud-container-identifiers:0' "$PROFILE_PLIST")
          case "$PROFILE_APP_ID" in
            "$TEAM_ID.com.omniflow.macos") ;;
            *) echo "Provisioning profile does not match com.omniflow.macos" >&2; exit 1 ;;
          esac
          test "$PROFILE_ICLOUD_CONTAINER" = "iCloud.com.omniflow" || {
            echo "Provisioning profile does not include iCloud.com.omniflow" >&2
            exit 1
          }

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$MACOS_SIGNING_IDENTITY"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.provisionprofile"
          {
            echo "MACOS_TEAM_ID=$TEAM_ID"
            echo "MACOS_PROFILE_UUID=$PROFILE_UUID"
          } >> "$GITHUB_ENV"

      - name: Build KMP framework
        run: ./gradlew :shared:linkReleaseFramework${{ matrix.kotlin_target }} --stacktrace

      - name: Build signed macOS app
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          xcodebuild build \
            -project appleApp/OmniFlow.xcodeproj \
            -scheme OmniFlow-macOS \
            -configuration Release \
            -sdk macosx \
            -derivedDataPath build/macos-derived-data \
            ARCHS="${{ matrix.arch }}" \
            ONLY_ACTIVE_ARCH=YES \
            FRAMEWORK_SEARCH_PATHS="$GITHUB_WORKSPACE/shared/build/bin/${{ matrix.framework_target }}/releaseFramework" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$MACOS_SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$MACOS_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$MACOS_PROFILE_UUID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime"

          APP="build/macos-derived-data/Build/Products/Release/OmniFlow-macOS.app"
          test -d "$APP"
          codesign --verify --deep --strict --verbose=4 "$APP"
          codesign --display --verbose=4 "$APP"

      - name: Package DMG
        run: |
          APP="build/macos-derived-data/Build/Products/Release/OmniFlow-macOS.app"
          test -d "$APP"
          STAGE="$RUNNER_TEMP/omniflow-dmg"
          VERSION="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist "$STAGE"
          ditto "$APP" "$STAGE/OmniFlow.app"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "OmniFlow" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "dist/OmniFlow-macOS-${{ matrix.arch }}-${VERSION}.dmg"
          codesign --force --sign "$MACOS_SIGNING_IDENTITY" --timestamp "dist/OmniFlow-macOS-${{ matrix.arch }}-${VERSION}.dmg"
          codesign --verify --verbose=4 "dist/OmniFlow-macOS-${{ matrix.arch }}-${VERSION}.dmg"

      - name: Notarize and validate DMG
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_PRIVATE_KEY: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          for value in APPLE_NOTARY_KEY_ID APPLE_NOTARY_ISSUER_ID APPLE_NOTARY_PRIVATE_KEY; do
            test -n "${!value}" || { echo "Missing required GitHub secret: $value" >&2; exit 1; }
          done

          VERSION="${GITHUB_REF_NAME//\//-}"
          DMG="dist/OmniFlow-macOS-${{ matrix.arch }}-${VERSION}.dmg"
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          printf '%s' "$APPLE_NOTARY_PRIVATE_KEY" | base64 -D > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          xcrun notarytool submit "$DMG" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

          MOUNT_POINT=$(mktemp -d "$RUNNER_TEMP/omniflow-verify.XXXXXX")
          trap 'hdiutil detach "$MOUNT_POINT" -quiet || true; rmdir "$MOUNT_POINT" || true' EXIT
          hdiutil attach -nobrowse -readonly -mountpoint "$MOUNT_POINT" "$DMG"
          codesign --verify --deep --strict --verbose=4 "$MOUNT_POINT/OmniFlow.app"
          spctl --assess --type execute --verbose=4 "$MOUNT_POINT/OmniFlow.app"

      - uses: actions/upload-artifact@v4
        with:
          name: OmniFlow-macOS-${{ matrix.arch }}-DMG
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish Tag Artifacts
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [android, ios, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.apk
            dist/**/*.ipa
            dist/**/*.dmg
