name: Build Three Platforms

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode Android keystore
        if: github.event_name != 'pull_request'
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          printf '%s' "$RELEASE_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/omniflow-release.keystore"
          test -s "$RUNNER_TEMP/omniflow-release.keystore"

      - name: Build signed release APK and test
        if: github.event_name != 'pull_request'
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :shared:jvmTest :androidApp:assembleRelease --stacktrace \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/omniflow-release.keystore" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Build pull request APK and test
        if: github.event_name == 'pull_request'
        run: ./gradlew :shared:jvmTest :androidApp:assembleDebug --stacktrace

      - name: Collect APK
        run: |
          mkdir -p dist
          APK=$(find androidApp/build/outputs/apk -type f -name '*.apk' -print -quit)
          test -n "$APK"
          cp "$APK" "dist/OmniFlow-Android-${GITHUB_SHA::7}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: OmniFlow-Android
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

  ios:
    name: iOS Simulator App
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build KMP framework
        run: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            ./gradlew :shared:linkReleaseFrameworkIosSimulatorArm64 --stacktrace
            echo "APPLE_ARCH=arm64" >> "$GITHUB_ENV"
            echo "FRAMEWORK_DIR=$GITHUB_WORKSPACE/shared/build/bin/iosSimulatorArm64/releaseFramework" >> "$GITHUB_ENV"
          else
            ./gradlew :shared:linkReleaseFrameworkIosX64 --stacktrace
            echo "APPLE_ARCH=x86_64" >> "$GITHUB_ENV"
            echo "FRAMEWORK_DIR=$GITHUB_WORKSPACE/shared/build/bin/iosX64/releaseFramework" >> "$GITHUB_ENV"
          fi

      - name: Build unsigned iOS Simulator app
        run: |
          xcodebuild build \
            -project appleApp/OmniFlow.xcodeproj \
            -scheme OmniFlow-iOS \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build/ios-derived-data \
            ARCHS="$APPLE_ARCH" \
            ONLY_ACTIVE_ARCH=YES \
            FRAMEWORK_SEARCH_PATHS="$FRAMEWORK_DIR" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package iOS app
        run: |
          APP="build/ios-derived-data/Build/Products/Release-iphonesimulator/OmniFlow-iOS.app"
          test -d "$APP"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP" \
            "dist/OmniFlow-iOS-Simulator-${GITHUB_SHA::7}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: OmniFlow-iOS-Simulator
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30

  macos:
    name: macOS App
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build KMP framework
        run: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            ./gradlew :shared:linkReleaseFrameworkMacosArm64 --stacktrace
            echo "APPLE_ARCH=arm64" >> "$GITHUB_ENV"
            echo "FRAMEWORK_DIR=$GITHUB_WORKSPACE/shared/build/bin/macosArm64/releaseFramework" >> "$GITHUB_ENV"
          else
            ./gradlew :shared:linkReleaseFrameworkMacosX64 --stacktrace
            echo "APPLE_ARCH=x86_64" >> "$GITHUB_ENV"
            echo "FRAMEWORK_DIR=$GITHUB_WORKSPACE/shared/build/bin/macosX64/releaseFramework" >> "$GITHUB_ENV"
          fi

      - name: Build unsigned macOS app
        run: |
          xcodebuild build \
            -project appleApp/OmniFlow.xcodeproj \
            -scheme OmniFlow-macOS \
            -configuration Release \
            -sdk macosx \
            -derivedDataPath build/macos-derived-data \
            ARCHS="$APPLE_ARCH" \
            ONLY_ACTIVE_ARCH=YES \
            FRAMEWORK_SEARCH_PATHS="$FRAMEWORK_DIR" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package macOS app
        run: |
          APP="build/macos-derived-data/Build/Products/Release/OmniFlow-macOS.app"
          test -d "$APP"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP" \
            "dist/OmniFlow-macOS-${GITHUB_SHA::7}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: OmniFlow-macOS
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish Tag Artifacts
    if: startsWith(github.ref, 'refs/tags/')
    needs: [android, ios, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.apk
            dist/**/*.zip
