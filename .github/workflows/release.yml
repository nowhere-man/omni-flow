name: Build Multiplatform

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android arm64-v8a APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v5

      - name: Verify shared logic, migrations, and Android lint
        run: ./gradlew :shared:jvmTest :shared:verifySqlDelightMigration :androidApp:lintRelease --stacktrace

      - name: Decode Android keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$RELEASE_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/omniflow-release.keystore"
          test -s "$RUNNER_TEMP/omniflow-release.keystore"

      - name: Build signed arm64-v8a release APK
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew :shared:compileKotlinJvm :androidApp:assembleRelease --stacktrace \
            -PandroidArm64Only=true \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/omniflow-release.keystore" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Collect APK
        run: |
          mkdir -p dist
          APK=$(find androidApp/build/outputs/apk -type f -name '*arm64-v8a*.apk' -print -quit)
          test -n "$APK"
          VERSION="${GITHUB_REF_NAME//\//-}"
          cp "$APK" "dist/OmniFlow-Android-arm64-v8a-${VERSION}.apk"

      - uses: actions/upload-artifact@v6
        with:
          name: OmniFlow-Android-arm64-v8a
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

  ios:
    name: iOS App (arm64 IPA)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v5

      - name: Build KMP device framework
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64 --stacktrace

      - name: Build unsigned iOS device app
        run: |
          xcodebuild build \
            -project appleApp/OmniFlow.xcodeproj \
            -scheme OmniFlow-iOS \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/ios-derived-data \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            FRAMEWORK_SEARCH_PATHS="$GITHUB_WORKSPACE/shared/build/bin/iosArm64/releaseFramework" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package unsigned IPA
        run: |
          APP="build/ios-derived-data/Build/Products/Release-iphoneos/OmniFlow-iOS.app"
          test -d "$APP"
          mkdir -p dist Payload
          ditto "$APP" Payload/OmniFlow-iOS.app
          VERSION="${GITHUB_REF_NAME//\//-}"
          ditto -c -k --sequesterRsrc --keepParent Payload "dist/OmniFlow-iOS-arm64-${VERSION}-unsigned.ipa"

      - uses: actions/upload-artifact@v6
        with:
          name: OmniFlow-iOS-arm64-IPA
          path: dist/*.ipa
          if-no-files-found: error
          retention-days: 30

  macos:
    name: macOS ${{ matrix.arch }} DMG
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            kotlin_target: MacosArm64
            framework_target: macosArm64
          - arch: x86_64
            runner: macos-15-intel
            kotlin_target: MacosX64
            framework_target: macosX64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v5

      - name: Build KMP framework
        run: ./gradlew :shared:linkReleaseFramework${{ matrix.kotlin_target }} --stacktrace

      - name: Build unsigned macOS app
        run: |
          xcodebuild build \
            -project appleApp/OmniFlow.xcodeproj \
            -scheme OmniFlow-macOS \
            -configuration Release \
            -sdk macosx \
            -derivedDataPath build/macos-derived-data \
            ARCHS="${{ matrix.arch }}" \
            ONLY_ACTIVE_ARCH=YES \
            FRAMEWORK_SEARCH_PATHS="$GITHUB_WORKSPACE/shared/build/bin/${{ matrix.framework_target }}/releaseFramework" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          APP="build/macos-derived-data/Build/Products/Release/OmniFlow.app"
          test -d "$APP"

      - name: Package DMG
        run: |
          APP="build/macos-derived-data/Build/Products/Release/OmniFlow.app"
          test -d "$APP"
          STAGE="$RUNNER_TEMP/omniflow-dmg"
          VERSION="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist "$STAGE"
          ditto "$APP" "$STAGE/OmniFlow.app"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "OmniFlow" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "dist/OmniFlow-macOS-${{ matrix.arch }}-${VERSION}.dmg"

      - uses: actions/upload-artifact@v6
        with:
          name: OmniFlow-macOS-${{ matrix.arch }}-DMG
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish Tag Artifacts
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [android, ios, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master

      - uses: actions/download-artifact@v7
        with:
          path: dist

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.1
        with:
          generate_release_notes: true
          files: |
            dist/**/*.apk
            dist/**/*.ipa
            dist/**/*.dmg

      - name: Update SideStore source
        run: |
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          IPA="dist/OmniFlow-iOS-arm64-IPA/OmniFlow-iOS-arm64-${TAG}-unsigned.ipa"
          SIZE=$(stat -c %s "$IPA")
          DATE=$(date -u +%F)
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/OmniFlow-iOS-arm64-${TAG}-unsigned.ipa"

          jq \
            --arg version "$VERSION" \
            --arg date "$DATE" \
            --arg url "$URL" \
            --argjson size "$SIZE" \
            '.apps[0].versions = ([{
              version: $version,
              date: $date,
              localizedDescription: "查看 GitHub Release 获取本次更新内容。",
              downloadURL: $url,
              size: $size,
              minOSVersion: "16.0"
            }] + [.apps[0].versions[] | select(.version != $version)])' \
            sidestore-source.json > sidestore-source.json.tmp
          mv sidestore-source.json.tmp sidestore-source.json

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add sidestore-source.json
          git diff --cached --quiet || git commit -m "chore: update SideStore source for ${TAG}"
          git push origin master
